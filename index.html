    <h1>Hugh O'Shaughnessy</h1>

    <p>

  <script>
  // ── Fluid Smoke ASCII — hughman.contact ──

  const WORD = ['H','U','G','H'];

  // Pink palette: index 0 = deepest/dimmest, 4 = brightest
  const PALETTE = [
    [150, 10, 90],    // near-invisible deep magenta
    [199, 21, 133],   // #c71585 medium violet red
    [255, 20, 147],   // #ff1493 deep pink
    [255, 105, 180],  // #ff69b4 hot pink
    [255, 0, 110],    // #ff006e vivid pink
  ];

  function densityColor(d) {
    // clamp to [0, 1.4], map to palette + alpha
    const norm = Math.min(d, 1.4) / 1.4;
    if (norm < 0.04) return null;

    const t = norm * (PALETTE.length - 1);
    const lo = Math.floor(t) | 0;
    const hi = Math.min(lo + 1, PALETTE.length - 1);
    const f = t - lo;
    const a = PALETTE[lo], b = PALETTE[hi];
    const r = (a[0] + (b[0] - a[0]) * f) | 0;
    const g = (a[1] + (b[1] - a[1]) * f) | 0;
    const v = (a[2] + (b[2] - a[2]) * f) | 0;
    // alpha: rapid ramp-up so smoke is opaque quickly, then stays bright
    const alpha = Math.min(1, norm * 2.0);
    return [r, g, v, alpha];
  }

  // ── Stable Fluids (Jos Stam 1999) ──
  class Fluid {
    constructor(cols, rows) {
      this.C = cols; this.R = rows;
      const n = cols * rows;
      this.dens  = new Float32Array(n);
      this.dens0 = new Float32Array(n);
      this.vx    = new Float32Array(n);
      this.vy    = new Float32Array(n);
      this.vx0   = new Float32Array(n);
      this.vy0   = new Float32Array(n);
      this.p     = new Float32Array(n); // pressure scratch
      this.div   = new Float32Array(n);
      this.visc  = 0.000025;
      this.diff  = 0.00003;
      this.dt    = 0.016;
    }

    ix(x, y) {
      return (Math.max(0, Math.min(this.C - 1, x | 0))) +
             (Math.max(0, Math.min(this.R - 1, y | 0))) * this.C;
    }

    addDensity(x, y, amt) { this.dens[this.ix(x, y)] += amt; }
    addVel(x, y, ax, ay)  { const i = this.ix(x, y); this.vx[i] += ax; this.vy[i] += ay; }

    setBound(b, arr) {
      const { C, R } = this;
      for (let i = 1; i < C - 1; i++) {
        arr[i + 0 * C]       = b === 2 ? -arr[i + 1 * C]       : arr[i + 1 * C];
        arr[i + (R-1) * C]   = b === 2 ? -arr[i + (R-2) * C]   : arr[i + (R-2) * C];
      }
      for (let j = 1; j < R - 1; j++) {
        arr[0 + j * C]       = b === 1 ? -arr[1 + j * C]       : arr[1 + j * C];
        arr[(C-1) + j * C]   = b === 1 ? -arr[(C-2) + j * C]   : arr[(C-2) + j * C];
      }
      arr[0 + 0 * C]         = 0.5 * (arr[1 + 0*C] + arr[0 + 1*C]);
      arr[(C-1) + 0*C]       = 0.5 * (arr[(C-2) + 0*C] + arr[(C-1) + 1*C]);
      arr[0 + (R-1)*C]       = 0.5 * (arr[1 + (R-1)*C] + arr[0 + (R-2)*C]);
      arr[(C-1) + (R-1)*C]   = 0.5 * (arr[(C-2) + (R-1)*C] + arr[(C-1) + (R-2)*C]);
    }

    diffuse(b, x, x0, coef, iter) {
      const { C, R, dt } = this;
      const a = dt * coef * (C - 2) * (R - 2);
      const inv = 1 / (1 + 4 * a);
      for (let k = 0; k < iter; k++) {
        for (let j = 1; j < R - 1; j++) {
          for (let i = 1; i < C - 1; i++) {
            x[i + j*C] = (x0[i + j*C] + a*(
              x[(i-1)+j*C] + x[(i+1)+j*C] + x[i+(j-1)*C] + x[i+(j+1)*C]
            )) * inv;
          }
        }
        this.setBound(b, x);
      }
    }

    advect(b, d, d0, u, v) {
      const { C, R, dt } = this;
      const dtx = dt * (C - 2), dty = dt * (R - 2);
      for (let j = 1; j < R - 1; j++) {
        for (let i = 1; i < C - 1; i++) {
          const idx = i + j * C;
          let x = i - dtx * u[idx];
          let y = j - dty * v[idx];
          x = Math.max(0.5, Math.min(C - 1.5, x));
          y = Math.max(0.5, Math.min(R - 1.5, y));
          const i0 = x | 0, i1 = i0 + 1;
          const j0 = y | 0, j1 = j0 + 1;
          const s1 = x - i0, s0 = 1 - s1;
          const t1 = y - j0, t0 = 1 - t1;
          d[idx] = s0*(t0*d0[i0+j0*C] + t1*d0[i0+j1*C]) +
                   s1*(t0*d0[i1+j0*C] + t1*d0[i1+j1*C]);
        }
      }
      this.setBound(b, d);
    }

    project(u, v, p, div, iter) {
      const { C, R } = this;
      const hx = 1.0 / C, hy = 1.0 / R;
      for (let j = 1; j < R - 1; j++) {
        for (let i = 1; i < C - 1; i++) {
          div[i+j*C] = -0.5*(hx*(u[(i+1)+j*C]-u[(i-1)+j*C]) + hy*(v[i+(j+1)*C]-v[i+(j-1)*C]));
          p[i+j*C] = 0;
        }
      }
      this.setBound(0, div); this.setBound(0, p);
      for (let k = 0; k < iter; k++) {
        for (let j = 1; j < R - 1; j++) {
          for (let i = 1; i < C - 1; i++) {
            p[i+j*C] = (div[i+j*C] + p[(i-1)+j*C] + p[(i+1)+j*C] + p[i+(j-1)*C] + p[i+(j+1)*C]) / 4;
          }
        }
        this.setBound(0, p);
      }
      for (let j = 1; j < R - 1; j++) {
        for (let i = 1; i < C - 1; i++) {
          u[i+j*C] -= 0.5*(p[(i+1)+j*C]-p[(i-1)+j*C])/hx;
          v[i+j*C] -= 0.5*(p[i+(j+1)*C]-p[i+(j-1)*C])/hy;
        }
      }
      this.setBound(1, u); this.setBound(2, v);
    }

    step(iters) {
      const { vx, vy, vx0, vy0, dens, dens0, visc, diff, p, div } = this;
      // velocity step
      this.diffuse(1, vx0, vx, visc, iters);
      this.diffuse(2, vy0, vy, visc, iters);
      this.project(vx0, vy0, p, div, iters);
      this.advect(1, vx, vx0, vx0, vy0);
      this.advect(2, vy, vy0, vx0, vy0);
      this.project(vx, vy, p, div, iters);
      // density step
      this.diffuse(0, dens0, dens, diff, iters);
      this.advect(0, dens, dens0, vx, vy);
      // decay
      for (let i = 0; i < dens.length; i++) dens[i] *= 0.993;
    }
  }

  // ── Setup ──
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let fluid, cols, rows, cellW, cellH, fontSz, charW, W, H;
  let solverIters = 4;
  let simTime = 0;

  const FONT = "Georgia, 'Times New Roman', serif";

  function initSim() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;

    // Target ~90 cols; scale font so chars pack screen nicely
    const targetCols = Math.round(W / 11);
    fontSz = Math.max(10, Math.min(22, Math.floor(W / targetCols)));

    ctx.font = `${fontSz}px ${FONT}`;
    // Measure each HUGH char; use average for uniform grid
    const ws = WORD.map(ch => ctx.measureText(ch).width);
    charW = ws; // store per-char widths for centered drawing
    const avgW = ws.reduce((a, b) => a + b, 0) / ws.length;

    const lineH = fontSz * 1.38;
    cols = Math.max(4, Math.ceil(W / avgW));
    rows = Math.max(4, Math.ceil(H / lineH));
    cellW = W / cols;
    cellH = H / rows;

    fluid = new Fluid(cols, rows);

    // Seed initial smoke
    for (let k = 0; k < 12; k++) {
      const cx = 1 + Math.random() * (cols - 2);
      const cy = rows * 0.5 + Math.random() * rows * 0.4;
      for (let di = -3; di <= 3; di++) {
        for (let dj = -3; dj <= 3; dj++) {
          const r = Math.sqrt(di*di + dj*dj);
          if (r < 3.5) fluid.addDensity(cx + di, cy + dj, (1 - r/3.5) * 0.7);
        }
      }
      fluid.addVel(cx, cy, (Math.random()-0.5)*0.5, -0.8 - Math.random()*0.5);
    }
  }

  // ── Ambient sources ──
  function addAmbient(t) {
    const numSrc = Math.max(3, cols / 18 | 0);
    for (let k = 0; k < numSrc; k++) {
      const phase = t * 0.6 + k * 2.1;
      const sx = Math.max(1, Math.min(cols-2, ((k + 0.5) / numSrc * cols + Math.sin(phase) * 4) | 0));
      const sy = rows - 2;
      fluid.addDensity(sx, sy, 1.1);
      fluid.addDensity(sx, sy - 1, 0.5);
      fluid.addVel(sx, sy, Math.sin(phase * 0.8) * 0.4, -2.0 - Math.sin(phase * 0.3) * 0.5);
    }
    // Occasional mid-field turbulence
    if (Math.random() < 0.25) {
      const rx = 1 + (Math.random() * (cols-2)) | 0;
      const ry = 1 + (Math.random() * (rows-2)) | 0;
      fluid.addVel(rx, ry, (Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6);
    }
  }

  // ── Interaction ──
  let lx = -1, ly = -1;

  window.addEventListener('mousemove', e => {
    if (!fluid) return;
    const nx = e.clientX / cellW;
    const ny = e.clientY / cellH;
    if (lx >= 0) {
      const dvx = (nx - lx) * 3, dvy = (ny - ly) * 3;
      const speed = Math.sqrt(dvx*dvx + dvy*dvy);
      if (speed > 0.05) {
        const gx = nx | 0, gy = ny | 0;
        const rad = Math.min(3, Math.ceil(speed));
        for (let di = -rad; di <= rad; di++) {
          for (let dj = -rad; dj <= rad; dj++) {
            const r = Math.sqrt(di*di+dj*dj);
            if (r <= rad) {
              const w = 1 - r/rad;
              fluid.addVel(gx+di, gy+dj, dvx*w, dvy*w);
              fluid.addDensity(gx+di, gy+dj, 0.4 * w * Math.min(speed/2, 1));
            }
          }
        }
      }
    }
    lx = nx; ly = ny;
  });

  let lastTouch = null;
  window.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!fluid) return;
    const t = e.touches[0];
    const nx = t.clientX / cellW, ny = t.clientY / cellH;
    if (lastTouch) {
      const dvx = (nx - lastTouch.x) * 4, dvy = (ny - lastTouch.y) * 4;
      const gx = nx | 0, gy = ny | 0;
      for (let di = -2; di <= 2; di++)
        for (let dj = -2; dj <= 2; dj++) {
          const w = 1 - Math.sqrt(di*di+dj*dj)/3;
          if (w > 0) {
            fluid.addVel(gx+di, gy+dj, dvx*w, dvy*w);
            fluid.addDensity(gx+di, gy+dj, 0.6*w);
          }
        }
    }
    lastTouch = { x: nx, y: ny };
  }, { passive: false });
  window.addEventListener('touchend', () => { lastTouch = null; });

  // DeviceOrientation (gyroscope tilt on mobile)
  window.addEventListener('deviceorientation', e => {
    if (!fluid || e.gamma == null) return;
    const ax = (e.gamma / 45) * 0.4; // left/right tilt
    const ay = ((e.beta - 45) / 45) * 0.4; // forward/back tilt
    const step = Math.max(3, cols / 20 | 0);
    for (let j = 1; j < rows-1; j += step) {
      for (let i = 1; i < cols-1; i += step) {
        fluid.addVel(i, j, ax + (Math.random()-0.5)*0.05, ay + (Math.random()-0.5)*0.05);
      }
    }
  });

  // ── Render ──
  // Pre-build gradient stops for fast per-cell coloring via ImageData
  // We'll use ctx.fillStyle + fillText per character (fast enough for our grid sizes)

  let frameCount = 0;
  let fpsStartTime = performance.now();
  let avgFps = 60;

  function frame(ts) {
    requestAnimationFrame(frame);
    frameCount++;

    // FPS monitoring — drop solver quality if struggling
    if (frameCount % 90 === 0) {
      const elapsed = ts - fpsStartTime;
      avgFps = 90 / (elapsed / 1000);
      fpsStartTime = ts;
      if (avgFps < 30 && solverIters > 2) {
        solverIters--;
      } else if (avgFps > 50 && solverIters < 6) {
        solverIters++;
      }
    }

    simTime += 0.016;
    addAmbient(simTime);
    fluid.step(solverIters);

    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    ctx.font = `${fontSz}px ${FONT}`;
    ctx.textBaseline = 'middle';

    const { dens, C, R } = fluid;

    for (let j = 0; j < R; j++) {
      for (let i = 0; i < C; i++) {
        const d = dens[i + j * C];
        if (d < 0.04) continue;

        const col = densityColor(d);
        if (!col) continue;

        // HUGH tiles left-to-right: column index mod 4
        const ci = i % 4;
        const ch = WORD[ci];

        // Center char in its cell using its measured width
        const cx = i * cellW + (cellW - charW[ci]) * 0.5;
        const cy = j * cellH + cellH * 0.5;

        ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${col[3].toFixed(3)})`;
        ctx.fillText(ch, cx, cy);
      }
    }
  }

  initSim();
  requestAnimationFrame(frame);

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(initSim, 120);
  });
  </script>
