<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>Hugh O'Shaughnessy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* Auto light/dark */
    :root {
      --bg:      #f5f4f0;
      --dim:     #aeaaa0;
      --surface: #ffffff;
      --border:  #e0dcd4;
      --shadow:  rgba(0,0,0,0.12);
      --text-tt: #1a1a1a;
      --sub-tt:  #666;
      --scan:    rgba(0,0,0,0.03);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0a0a0a;
        --dim:     #3a3a3a;
        --surface: #161616;
        --border:  #2a2a2a;
        --shadow:  rgba(0,0,0,0.6);
        --text-tt: #e8e4dc;
        --sub-tt:  #888;
        --scan:    rgba(0,0,0,0.08);
      }
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        var(--scan) 3px, var(--scan) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #grid {
      display: grid;
      width: 90vw;
      height: 90vh;
    }

    /* Letter cell */
    .letter {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Space Mono', monospace;
      color: var(--dim);
      opacity: 0;
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      will-change: transform, opacity;
      user-select: none;
      position: relative;
    }

    @keyframes pop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      65%  { transform: scale(1.35) rotate(8deg);  opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Attachment cell transitions */
    .letter.colored {
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                  filter 0.18s ease;
    }

    /* Group hover: pop out, no glow */
    .letter.hovered {
      transform: scale(1.28) translateY(-2px);
      z-index: 5;
      filter: brightness(1.15);
    }

    /* Linked cells: pointer only, no decoration */
    .letter.linked { cursor: pointer; }

    /* Full-cell anchor */
    .letter a {
      display: flex;
      width: 100%; height: 100%;
      justify-content: center;
      align-items: center;
      color: inherit;
      text-decoration: none;
    }

    /* ── Tooltip ── */
    #tt {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow), 0 2px 8px var(--shadow);
      padding: 14px 16px 12px;
      min-width: 190px;
      max-width: 270px;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
    }
    #tt.visible { display: block; }

    .tt-head {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-tt);
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .tt-body {
      font-size: 10px;
      color: var(--sub-tt);
      line-height: 1.5;
    }

    /* Resume preview */
    .tt-resume {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      pointer-events: all;
    }
    .tt-resume-page {
      width: 100%;
      background: #fff;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .r-name   { font-size: 9px; font-weight:700; color:#1a1a1a; letter-spacing:0.1em; }
    .r-contact{ font-size: 6.5px; color:#888; margin-bottom:3px; }
    .r-rule   { height:1px; background:#ddd; margin: 2px 0; }
    .r-section{ font-size:7px; font-weight:700; color:#333; letter-spacing:0.12em; margin-top:5px; }
    .r-line   { height:5px; border-radius:2px; background:#e8e8e8; }
    .r-line.short{ width:50%; }
    .r-line.mid  { width:72%; }
    .r-line.full { width:100%; }
    .r-line.long { width:88%; }
    .tt-resume-hint {
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 9px;
      color: var(--sub-tt);
      text-align: center;
      padding: 5px 0 6px;
      letter-spacing: 0.07em;
      font-family: 'Space Mono', monospace;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <div id="grid"></div>

  <div id="tt">
    <div class="tt-head" id="tt-head"></div>
    <div class="tt-body" id="tt-body"></div>
    <div class="tt-resume" id="tt-resume" style="display:none">
      <div class="tt-resume-page">
        <div class="r-name">HUGH O'SHAUGHNESSY</div>
        <div class="r-contact">madison, wi · hughoshaugh@gmail.com</div>
        <div class="r-rule"></div>
        <div class="r-section">EDUCATION</div>
        <div class="r-line mid"></div>
        <div class="r-line short"></div>
        <div class="r-section">EXPERIENCE</div>
        <div class="r-line full"></div>
        <div class="r-line long"></div>
        <div class="r-line mid"></div>
        <div class="r-line full"></div>
        <div class="r-line short"></div>
        <div class="r-section">PROJECTS</div>
        <div class="r-line long"></div>
        <div class="r-line mid"></div>
        <div class="r-section">SKILLS</div>
        <div class="r-line full"></div>
        <div class="r-line short"></div>
      </div>
      <div class="tt-resume-hint">↗ open resume</div>
    </div>
  </div>

  <script>
    const W = "HUGH";

    const ATT = [
      { id:0, text:"'S WEBSITE",  url:null,                                                       head:"Hugh's Website",  body:"You're already here!",       color:"#c8960c", pre:false, perp:false,      resume:false },
      { id:1, text:"'S LINKEDIN", url:"https://www.linkedin.com/in/hugh-o-shaughnessy-a440b2231", head:"LinkedIn",        body:"View my profile",            color:"#0077B5", pre:false, perp:false,      resume:false },
      { id:2, text:"'S GITHUB",   url:"https://github.com/hughosh",                               head:"GitHub",          body:"Browse my repos",            color:"#C9510C", pre:false, perp:false,      resume:false },
      { id:3, text:"ABOUT ",      url:"hughosh_resume_2026.pdf",                                               head:"About Hugh",      body:"Senior CS @ UW–Madison",     color:"#9966CC", pre:true,  perp:false,      resume:true  },
      { id:4, text:"EMAIL ",      url:"mailto:hughoshaugh@gmail.com",                             head:"Email Me",        body:"hughoshaugh@gmail.com",      color:"#e05a8a", pre:true,  perp:false,      resume:false },
      { id:5, text:"IRE ME",      url:"mailto:hughoshaugh@gmail.com",                             head:"Hire Me!",        body:"Let's work together",        color:"#39FF14", pre:false, perp:true, li:3, resume:false },
    ];

    // All valid contiguous groups
    const VALID = new Set([W]);
    for (const a of ATT)
      VALID.add(a.perp ? W[a.li] + a.text : a.pre ? a.text + W : W + a.text);

    function bbox(g) {
      let [x0,x1,y0,y1]=[Infinity,-Infinity,Infinity,-Infinity];
      g.forEach((_,k)=>{
        const[x,y]=k.split(",").map(Number);
        x0=Math.min(x0,x);x1=Math.max(x1,x);
        y0=Math.min(y0,y);y1=Math.max(y1,y);
      });
      return{x0,x1,y0,y1};
    }

    // Validate row/col groups
    function valid(g) {
      const R={},C={};
      g.forEach((l,k)=>{
        const[x,y]=k.split(",").map(Number);
        (R[y]||=[]).push({p:x,l});
        (C[x]||=[]).push({p:y,l});
      });
      const chk=cells=>{
        cells.sort((a,b)=>a.p-b.p);
        let grp=[];
        for(const c of cells){
          if(!grp.length||c.p===grp[grp.length-1].p+1) grp.push(c);
          else{
            if(grp.length>1&&!VALID.has(grp.map(x=>x.l).join(""))) return false;
            grp=[c];
          }
        }
        return grp.length<=1||VALID.has(grp.map(x=>x.l).join(""));
      };
      return[...Object.values(R),...Object.values(C)].every(chk);
    }

    // Place word; returns true on success
    function place(x,y,o,g,ws){
      if(ws.some(w=>w.x===x&&w.y===y&&w.o===o)) return false;
      const c=new Map(g);
      for(let i=0;i<W.length;i++){
        const k=o==="h"?`${x+i},${y}`:`${x},${y+i}`;
        if(c.has(k)&&c.get(k)!==W[i]) return false;
        c.set(k,W[i]);
      }
      if(!valid(c)) return false;
      c.forEach((v,k)=>g.set(k,v));
      ws.push({x,y,o}); return true;
    }

    // Perpendicular candidates from placed word
    function cands(w){
      const no=w.o==="h"?"v":"h",seen=new Set(),res=[];
      for(let i=0;i<W.length;i++)
        for(let j=0;j<W.length;j++){
          if(W[i]!==W[j]) continue;
          const ix=w.o==="h"?w.x+i:w.x, iy=w.o==="h"?w.y:w.y+i;
          const nx=no==="h"?ix-j:ix, ny=no==="h"?iy:iy-j;
          const key=`${nx},${ny},${no}`;
          if(!seen.has(key)){seen.add(key);res.push({x:nx,y:ny,o:no});}
        }
      return res;
    }

    // BFS from start cell
    function bfs(g,s){
      const d=new Map([[s,0]]),q=[s];
      while(q.length){
        const[cx,cy]=q.shift().split(",").map(Number);
        const dist=d.get(`${cx},${cy}`);
        for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
          const nk=`${cx+dx},${cy+dy}`;
          if(g.has(nk)&&!d.has(nk)){d.set(nk,dist+1);q.push(nk);}
        }
      }
      return d;
    }

    function shuffle(a){
      for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
      return a;
    }

    function gen(){
      for(let attempt=0;attempt<30;attempt++){
        const g=new Map(),ws=[],q=[];
        place(0,0,"h",g,ws);
        q.push(...cands(ws[0]));
        const tried=new Set(["0,0,h"]);

        // Grow crossword BFS
        while(q.length&&ws.length<15){
          const i=Math.floor(Math.random()*q.length);
          const[c]=q.splice(i,1);
          const key=`${c.x},${c.y},${c.o}`;
          if(tried.has(key)) continue;
          tried.add(key);
          if(place(c.x,c.y,c.o,g,ws)) q.push(...cands(ws[ws.length-1]));
        }

        if(ws.length<ATT.length) continue;

        // Attach all extras
        const ep=new Map();
        const avail=shuffle(ws.slice());
        let allOk=true;

        for(const att of ATT){
          let placed=false;
          for(const w of avail.slice()){
            let cells=[],base=[];
            if(att.perp){
              if(w.o!=="v") continue;
              const hx=w.x,hy=w.y+att.li;
              for(let j=0;j<att.text.length;j++) cells.push({k:`${hx+1+j},${hy}`,l:att.text[j]});
              base=[`${hx},${hy}`];
            } else if(w.o==="h"){
              const sx=att.pre?w.x-att.text.length:w.x+W.length;
              for(let j=0;j<att.text.length;j++) cells.push({k:`${sx+j},${w.y}`,l:att.text[j]});
              for(let j=0;j<W.length;j++) base.push(`${w.x+j},${w.y}`);
            } else {
              const sy=att.pre?w.y-att.text.length:w.y+W.length;
              for(let j=0;j<att.text.length;j++) cells.push({k:`${w.x},${sy+j}`,l:att.text[j]});
              for(let j=0;j<W.length;j++) base.push(`${w.x},${w.y+j}`);
            }
            if(cells.some(c=>g.has(c.k))) continue;
            const cand=new Map(g);
            for(const c of cells) cand.set(c.k,c.l);
            if(!valid(cand)) continue;
            for(const c of cells){g.set(c.k,c.l);ep.set(c.k,att);}
            for(const k of base) if(!ep.has(k)) ep.set(k,att);
            avail.splice(avail.indexOf(w),1);
            placed=true; break;
          }
          if(!placed){allOk=false;break;}
        }

        if(!allOk) continue;
        render(g,ep); return;
      }
      console.error("Generation failed after 30 attempts");
    }

    // ── Tooltip ──
    const ttEl   =document.getElementById("tt");
    const ttHead =document.getElementById("tt-head");
    const ttBody =document.getElementById("tt-body");
    const ttRes  =document.getElementById("tt-resume");
    let hideTimer=null;

    // Anchor tooltip to entire group bbox — no jitter between letters
    function showTT(att,groupEls){
      clearTimeout(hideTimer);
      ttHead.textContent=att.head;
      ttBody.textContent=att.body;
      ttRes.style.display=att.resume?"block":"none";
      if(att.resume){
        ttRes.onclick=()=>window.open("hughosh_resume_2026.pdf","_blank");
        ttRes.style.cursor="pointer";
      }
      ttEl.classList.add("visible");
      const rs=groupEls.map(e=>e.getBoundingClientRect());
      const gL=Math.min(...rs.map(r=>r.left)), gR=Math.max(...rs.map(r=>r.right));
      const gT=Math.min(...rs.map(r=>r.top)),  gB=Math.max(...rs.map(r=>r.bottom));
      const tw=Math.max(ttEl.offsetWidth,190), th=ttEl.offsetHeight;
      let left=(gL+gR)/2-tw/2;
      let top=gT-th-12;
      if(top<8) top=gB+12;
      ttEl.style.left=Math.max(8,Math.min(left,window.innerWidth-tw-8))+"px";
      ttEl.style.top=top+"px";
    }

    function hideTT(){
      hideTimer=setTimeout(()=>ttEl.classList.remove("visible"),130);
    }

    ttEl.addEventListener("mouseenter",()=>clearTimeout(hideTimer));
    ttEl.addEventListener("mouseleave",hideTT);

    function render(g,ep){
      const{x0,x1,y0,y1}=bbox(g);
      const numCols=x1-x0+1,numRows=y1-y0+1;
      const cont=document.getElementById("grid");
      cont.style.gridTemplateColumns=`repeat(${numCols},1fr)`;
      cont.style.gridTemplateRows=`repeat(${numRows},1fr)`;
      cont.innerHTML="";

      // Proportional font size
      const cellW=(window.innerWidth*0.9)/numCols;
      const cellH=(window.innerHeight*0.9)/numRows;
      const fs=Math.max(8,Math.min(26,Math.floor(Math.min(cellW,cellH)*0.52)));
      cont.style.fontSize=fs+"px";

      // BFS spiral delays from origin H
      const dist=bfs(g,"0,0");
      const maxD=dist.size>1?Math.max(...dist.values()):0;

      const groups=Object.fromEntries(ATT.map(a=>[a.id,[]]));

      g.forEach((letter,key)=>{
        const[x,y]=key.split(",").map(Number);
        const el=document.createElement("div");
        el.className="letter";
        el.style.gridColumnStart=x-x0+1;
        el.style.gridRowStart=y-y0+1;

        const d=dist.has(key)?dist.get(key):maxD;
        el.style.animationDelay=`${d*0.065+Math.random()*0.025}s`;

        if(ep.has(key)){
          const att=ep.get(key);
          el.classList.add("colored");
          el.style.color=att.color;
          groups[att.id].push(el);

          if(att.url){
            el.classList.add("linked");
            const a=document.createElement("a");
            a.href=att.url;
            a.target="_blank";
            a.rel="noopener noreferrer";
            a.textContent=letter;
            el.appendChild(a);
          } else {
            el.textContent=letter;
          }

          el.addEventListener("mouseenter",()=>showTT(att,groups[att.id]));
          el.addEventListener("mouseleave",hideTT);
        } else {
          el.textContent=letter;
        }

        cont.appendChild(el);
      });

      // Sync pop-out per group
      for(const els of Object.values(groups)){
        if(!els.length) continue;
        for(const el of els){
          el.addEventListener("mouseenter",()=>els.forEach(e=>e.classList.add("hovered")));
          el.addEventListener("mouseleave",()=>els.forEach(e=>e.classList.remove("hovered")));
        }
      }
    }

    window.addEventListener("DOMContentLoaded",gen);
  </script>
</body>
</html>
